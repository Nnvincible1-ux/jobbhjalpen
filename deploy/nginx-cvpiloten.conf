# CV-piloten – Nginx-konfiguration (alternativ till Caddy)
# Lägg i /etc/nginx/sites-available/cvpiloten och symlinka till sites-enabled.
# Kör sedan certbot för HTTPS: sudo certbot --nginx -d cvpiloten.se -d www.cvpiloten.se

server {
    listen 80;
    server_name cvpiloten.se www.cvpiloten.se;

    # Certbot fyller på 443-blocket automatiskt. Tills dess proxas http.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 20M; # tillåt uppladdning av CV-filer
}
